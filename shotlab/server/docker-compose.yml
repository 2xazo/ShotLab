# ShotLab — local dev stack (API + Postgres).
# If you're using a hosted database (Supabase/Neon), you don't need the
# `postgres` service: just set DATABASE_URL/DIRECT_URL in .env to your hosted
# URL and run `docker compose up api` (or `npm run dev`).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shotlab
      POSTGRES_PASSWORD: shotlab
      POSTGRES_DB: shotlab
    ports:
      - '5432:5432'
    volumes:
      - shotlab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shotlab']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override to talk to the compose Postgres by service name.
      DATABASE_URL: postgresql://shotlab:shotlab@postgres:5432/shotlab?schema=shotlab
      DIRECT_URL: postgresql://shotlab:shotlab@postgres:5432/shotlab?schema=shotlab
    ports:
      - '4000:4000'
    volumes:
      - ./uploads:/app/uploads
    command: sh -c "npx prisma db push && node prisma/seed.mjs && node src/index.js"

volumes:
  shotlab_pg:
