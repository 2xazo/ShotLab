services:
  - type: web
    name: shotlab
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate
    startCommand: node server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 7d
      - key: COOKIE_DOMAIN
        value: ""
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_MB
        value: "25"
